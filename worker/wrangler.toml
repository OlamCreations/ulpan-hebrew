name = "ulpan-morph"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Per-IP rate limit (native Workers binding): 100 requests / 60s. Blocks scripted abuse of the
# public endpoint without touching the free-tier quota for real use.
[[unsafe.bindings]]
name = "RL"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }

# Anonymous usage analytics for /track (free tier). No cookies, no PII — the client sends
# a random anon id + event names; country/device are derived server-side from the request.
[[analytics_engine_datasets]]
binding = "AE"
dataset = "ulpan_events"

# Workers AI binding for the /nat "natural version" layer (Llama 3.3 70B). Free tier: a daily
# neuron allowance; /nat is on-demand + 7-day cached, so real personal use stays well under it.
[ai]
binding = "AI"
