<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Ulpan Hebrew</title>
<!-- Styles are inlined: this page is served under whatever wrong URL was requested, so a
     relative stylesheet href would itself 404. Same reason the home link is set from JS. -->
<style>
  :root { color-scheme: dark light }
  body { margin:0; background:#0a0a0a; color:#e5e5e5;
         font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif }
  main { max-width:34rem; margin:14vh auto; padding:0 1.4rem; text-align:center }
  h1 { font-size:2.4rem; margin:0 0 .6rem; font-weight:600 }
  p { opacity:.72 }
  a { color:#4A9EDB }
  @media (prefers-color-scheme: light) {
    body { background:#fff; color:#1a1a1a } a { color:#0071B9 }
  }
</style>
<script>
/* Legacy-URL shim. Pages used to live flat at the site root and now sit one folder deep, so
   old links, bookmarks and stale service-worker entries land here. Remap by the same pattern
   rules the layout uses, then replace() so the wrong URL leaves no history entry.
   GENERATED by tools/build-404.mjs — edit layout.config.json, not this file. */
(function () {
  var RULES = [
  ["^\\d+-.+\\.html$", "lessons"],
  ["^root-.+\\.html$", "roots"],
  ["^(prayers|shabbat|songs|tehilim)-.+\\.html$", "liturgy"],
  ["^(morpho|cursive|calendar)-.+\\.html$", "reference"],
  ["^expressions\\.html$", "reference"]
  ];
  var FOLDERS = ["lessons","roots","liturgy","reference","reference"];
  var path = location.pathname;
  var name = path.split('/').pop();

  // The site may be served from a sub-path (GitHub Pages project site), so the way back home
  // is derived from where we are, never assumed to be "/".
  document.addEventListener('DOMContentLoaded', function () {
    var home = document.getElementById('home-link');
    if (!home) return;
    var base = path.slice(0, path.length - name.length);
    var known = FOLDERS.indexOf(base.replace(/\/$/, '').split('/').pop());
    home.href = (known !== -1 ? base + '../' : base) + 'index.html';
  });

  if (!name || !/\.html$/.test(name)) return;

  // Only a *flat* legacy path can be remapped. If the URL already names a folder, the page
  // genuinely does not exist and guessing would bounce the visitor between two 404s.
  var parent = path.slice(0, -name.length).replace(/\/$/, '').split('/').pop();
  if (FOLDERS.indexOf(parent) !== -1) return;

  for (var i = 0; i < RULES.length; i++) {
    if (new RegExp(RULES[i][0]).test(name)) {
      var base = path.slice(0, path.length - name.length);
      location.replace(base + RULES[i][1] + '/' + name + location.search + location.hash);
      return;
    }
  }
})();
</script>
<main>
  <h1>404</h1>
  <p>This page does not exist. The lessons were reorganised into folders — if you followed an
  old link it should have redirected on its own.</p>
  <p><a id="home-link" href="index.html">Back to the index</a></p>
</main>
