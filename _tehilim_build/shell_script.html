function renderFretboard(chord) {
  const stringSpacing = 18;
  const fretSpacing = 22;
  const offsetX = 28;
  const offsetY = 36;
  const baseFret = chord.baseFret;
  const STR_COUNT = 6;

  // Auto-compute number of frets to fit all fretted notes (min 4)
  const fretted = chord.frets.filter(f => f > 0);
  const maxFret = fretted.length > 0 ? Math.max(...fretted) : baseFret + 3;
  const numFrets = Math.max(4, maxFret - baseFret + 1);

  const W = offsetX * 2 + stringSpacing * (STR_COUNT - 1);
  const H = offsetY + numFrets * fretSpacing + 22;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Nut (if open position) or fret number indicator
  if (baseFret === 1) {
    svg += `<rect x="${offsetX - 1}" y="${offsetY - 4}" width="${stringSpacing * (STR_COUNT - 1) + 2}" height="5" fill="#ccc"/>`;
  } else {
    svg += `<text x="${offsetX - 10}" y="${offsetY + 14}" fill="#4A9EDB" font-size="11" text-anchor="end" font-family="monospace" font-weight="600">${baseFret}fr</text>`;
  }

  // Frets (horizontal lines)
  for (let i = 0; i <= numFrets; i++) {
    svg += `<line x1="${offsetX}" y1="${offsetY + i * fretSpacing}" x2="${offsetX + (STR_COUNT - 1) * stringSpacing}" y2="${offsetY + i * fretSpacing}" stroke="#444" stroke-width="1"/>`;
  }

  // Strings (vertical lines)
  for (let i = 0; i < STR_COUNT; i++) {
    svg += `<line x1="${offsetX + i * stringSpacing}" y1="${offsetY}" x2="${offsetX + i * stringSpacing}" y2="${offsetY + numFrets * fretSpacing}" stroke="#666" stroke-width="1"/>`;
  }

  // Open / muted indicators above strings
  for (let i = 0; i < STR_COUNT; i++) {
    const f = chord.frets[i];
    const x = offsetX + i * stringSpacing;
    if (f === -1) {
      svg += `<text x="${x}" y="${offsetY - 8}" fill="#666" font-size="14" text-anchor="middle" font-weight="600">×</text>`;
    } else if (f === 0) {
      svg += `<circle cx="${x}" cy="${offsetY - 10}" r="5" fill="none" stroke="#4A9EDB" stroke-width="1.5"/>`;
    }
  }

  // Barre (if any) — drawn before dots so dots appear on top
  if (chord.barre) {
    const barreFret = chord.barre;
    let firstStr = -1, lastStr = -1;
    for (let i = 0; i < STR_COUNT; i++) {
      if (chord.frets[i] === barreFret) {
        if (firstStr === -1) firstStr = i;
        lastStr = i;
      }
    }
    if (firstStr !== -1 && lastStr > firstStr) {
      const fretRel = barreFret - baseFret;
      const yPos = offsetY + (fretRel + 0.5) * fretSpacing;
      svg += `<rect x="${offsetX + firstStr * stringSpacing - 8}" y="${yPos - 8}" width="${(lastStr - firstStr) * stringSpacing + 16}" height="16" rx="8" fill="#4A9EDB" opacity="0.9"/>`;
      const midX = offsetX + (firstStr + lastStr) / 2 * stringSpacing;
      const fontSize = barreFret >= 10 ? 9 : 10;
      svg += `<text x="${midX}" y="${yPos + 3.5}" fill="#0a0a0a" font-size="${fontSize}" text-anchor="middle" font-weight="700" font-family="monospace">${barreFret}</text>`;
    }
  }

  // Finger dots (skip those that are part of the barre rectangle)
  for (let i = 0; i < STR_COUNT; i++) {
    const f = chord.frets[i];
    if (f > 0) {
      const fretRel = f - baseFret;
      if (fretRel < 0 || fretRel >= numFrets) continue;
      if (chord.barre && f === chord.barre) continue;
      const x = offsetX + i * stringSpacing;
      const y = offsetY + (fretRel + 0.5) * fretSpacing;
      svg += `<circle cx="${x}" cy="${y}" r="8" fill="#4A9EDB" stroke="#0a0a0a" stroke-width="1"/>`;
      const fontSize = f >= 10 ? 9 : 10;
      svg += `<text x="${x}" y="${y + 3.5}" fill="#0a0a0a" font-size="${fontSize}" text-anchor="middle" font-weight="700" font-family="monospace">${f}</text>`;
    }
  }

  // String labels at the bottom — uses the current tuning (mutable global)
  for (let i = 0; i < STR_COUNT; i++) {
    svg += `<text x="${offsetX + i * stringSpacing}" y="${offsetY + numFrets * fretSpacing + 14}" fill="#555" font-size="9" text-anchor="middle" font-family="monospace">${TUNING[i] || ''}</text>`;
  }

  svg += `</svg>`;
  return svg;
}

// ====== TUNING (mutable) ======
let TUNING = ['E', 'A', 'D', 'G', 'B', 'E'];

const TUNING_PRESETS = {
  'standard':  ['E', 'A', 'D', 'G', 'B', 'E'],
  'drop-d':    ['D', 'A', 'D', 'G', 'B', 'E'],
  'dadgad':    ['D', 'A', 'D', 'G', 'A', 'D'],
  'open-d':    ['D', 'A', 'D', 'F#', 'A', 'D'],
  'open-g':    ['D', 'G', 'D', 'G', 'B', 'D'],
  'open-c':    ['C', 'G', 'C', 'G', 'C', 'E'],
  'half-down': ['Eb', 'Ab', 'Db', 'Gb', 'Bb', 'Eb'],
  'full-down': ['D', 'G', 'C', 'F', 'A', 'D']
};

function setTuning(arr) {
  if (Array.isArray(arr) && arr.length === 6) {
    TUNING = arr.slice();
    try { localStorage.setItem('tehilim-tuning', JSON.stringify(TUNING)); } catch (e) {}
    const cur = document.getElementById('tuning-current');
    if (cur) cur.textContent = TUNING.join(' ');
    if (typeof renderActiveVoicings === 'function') renderActiveVoicings();
  }
}

function tuningKey() { return TUNING.join(' '); }

function parseTuningString(str) {
  const tokens = str.trim().split(/[\s,]+/).filter(Boolean);
  return tokens.length === 6 ? tokens : null;
}

function findTuningPreset(arr) {
  for (const [k, v] of Object.entries(TUNING_PRESETS)) {
    if (v.join(' ') === arr.join(' ')) return k;
  }
  return null;
}

// ====== PINNED VOICINGS per (chord, tuning) ======
// Multiple voicings can be pinned per chord — each pinned voicing renders as a card in the panel.
let ACTIVE_POS = {}; // { 'Am|E A D G B E': [0, 4, 6], ... } — array of position indices

function loadActivePos() {
  try {
    const raw = localStorage.getItem('tehilim-activePos');
    if (!raw) { ACTIVE_POS = {}; return; }
    const parsed = JSON.parse(raw);
    ACTIVE_POS = {};
    for (const k in parsed) {
      const v = parsed[k];
      if (typeof v === 'number') ACTIVE_POS[k] = [v]; // legacy migration
      else if (Array.isArray(v)) ACTIVE_POS[k] = v.slice();
    }
  } catch (e) { ACTIVE_POS = {}; }
}

function saveActivePos() {
  try { localStorage.setItem('tehilim-activePos', JSON.stringify(ACTIVE_POS)); } catch (e) {}
}

function getPinned(chordName) {
  const k = chordName + '|' + tuningKey();
  const arr = ACTIVE_POS[k];
  if (Array.isArray(arr) && arr.length > 0) return arr.slice().sort((a, b) => a - b);
  return [0]; // default: show first voicing
}

function isPinned(chordName, idx) {
  const k = chordName + '|' + tuningKey();
  const arr = ACTIVE_POS[k];
  if (Array.isArray(arr)) return arr.includes(idx);
  return idx === 0; // default: only index 0 considered pinned
}

function togglePin(chordName, idx) {
  const k = chordName + '|' + tuningKey();
  // If no entry yet, the implicit pinned set is [0]. Make it explicit before toggling.
  if (!Array.isArray(ACTIVE_POS[k])) ACTIVE_POS[k] = [0];
  const arr = ACTIVE_POS[k];
  const at = arr.indexOf(idx);
  if (at >= 0) arr.splice(at, 1);
  else arr.push(idx);
  if (arr.length === 0) delete ACTIVE_POS[k];
  saveActivePos();
}

// ====== CHORD LOOKUP (handles Gmaj7, Am7, Cdim, etc. by searching root variations) ======
function variationPrimaryName(name) {
  const idx = name.search(/[\s·]/);
  return idx === -1 ? name : name.slice(0, idx);
}

function nameMatchesChord(variationName, chordName) {
  const primary = variationPrimaryName(variationName);
  if (primary === chordName) return true;
  const parens = variationName.match(/\(([^)]+)\)/);
  if (parens && parens[1].trim() === chordName) return true;
  return false;
}

function lookupChord(chordName) {
  // 1. Direct top-level key (e.g. 'Am', 'G')
  if (CHORDS[chordName]) return CHORDS[chordName];

  // 2. Search variations within the root chord
  const root = chordRoot(chordName);
  if (!root) return [];

  const candidates = [];
  if (chordIsMinor(chordName)) candidates.push(root + 'm');
  candidates.push(root);

  for (const key of candidates) {
    const entries = CHORDS[key];
    if (!entries) continue;
    const matches = entries.filter(v => nameMatchesChord(v.name, chordName));
    if (matches.length > 0) return matches;
  }

  return [];
}

// ====== USER VOICINGS (per chord, per tuning) ======
let USER_VOICINGS = {}; // { 'Am|E A D G B E': [{name, frets, baseFret, barre}, ...] }

function loadUserVoicings() {
  try {
    const raw = localStorage.getItem('tehilim-userVoicings');
    if (raw) USER_VOICINGS = JSON.parse(raw) || {};
  } catch (e) { USER_VOICINGS = {}; }
}

function saveUserVoicings() {
  try { localStorage.setItem('tehilim-userVoicings', JSON.stringify(USER_VOICINGS)); } catch (e) {}
}

function getUserVoicings(chordName) {
  const k = chordName + '|' + tuningKey();
  return USER_VOICINGS[k] || [];
}

function addUserVoicing(chordName, voicing) {
  const k = chordName + '|' + tuningKey();
  if (!USER_VOICINGS[k]) USER_VOICINGS[k] = [];
  USER_VOICINGS[k].push(voicing);
  saveUserVoicings();
}

function removeUserVoicing(chordName, indexInUserList) {
  const k = chordName + '|' + tuningKey();
  if (USER_VOICINGS[k] && USER_VOICINGS[k][indexInUserList]) {
    USER_VOICINGS[k].splice(indexInUserList, 1);
    if (USER_VOICINGS[k].length === 0) delete USER_VOICINGS[k];
    saveUserVoicings();
  }
}

function parseFretsString(str) {
  const tokens = str.trim().split(/[\s,\-]+/).filter(Boolean);
  if (tokens.length !== 6) return null;
  const frets = tokens.map(t => {
    const lo = t.toLowerCase();
    if (lo === 'x' || lo === '-' || lo === 'm') return -1;
    if (lo === 'o') return 0;
    const n = parseInt(t, 10);
    return isNaN(n) ? null : n;
  });
  if (frets.some(f => f === null)) return null;
  return frets;
}

function buildVoicingFromFrets(frets, name) {
  const fretted = frets.filter(f => f > 0);
  const hasOpens = frets.some(f => f === 0);
  const baseFret = (hasOpens || fretted.length === 0) ? 1 : Math.min(...fretted);
  return { name: name || 'Custom', frets, baseFret, barre: null, _user: true };
}

// ====== CHORD THEORY ======
const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const FLAT_TO_SHARP = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };

function noteToIdx(n) {
  if (NOTE_NAMES.indexOf(n) >= 0) return NOTE_NAMES.indexOf(n);
  if (FLAT_TO_SHARP[n]) return NOTE_NAMES.indexOf(FLAT_TO_SHARP[n]);
  return -1;
}

function transposeNote(note, semitones) {
  const idx = noteToIdx(note);
  if (idx < 0) return note;
  return NOTE_NAMES[(idx + semitones + 120) % 12];
}

function chordRoot(name) {
  const m = name.match(/^([A-G][#b]?)/);
  return m ? m[1] : null;
}

function chordIsMinor(name) {
  const after = name.slice(1).replace(/^[#b]/, '');
  return /^m(?!aj)/.test(after) || after.startsWith('dim') || after.startsWith('°');
}

function getHarmonic(chordName, type) {
  const root = chordRoot(chordName);
  if (!root) return [];
  const isMin = chordIsMinor(chordName);
  const T = (n, suffix) => transposeNote(root, n) + (suffix || '');

  switch (type) {
    case 'diatonique':
      return isMin ? [
        { chord: T(2, 'dim'),  label: 'ii° · supertonique' },
        { chord: T(3),         label: 'bIII · relatif majeur' },
        { chord: T(5, 'm'),    label: 'iv · sous-dominante' },
        { chord: T(7, 'm'),    label: 'v · dominante (mineur naturel)' },
        { chord: T(7),         label: 'V · dominante (mineur harm.)' },
        { chord: T(8),         label: 'bVI' },
        { chord: T(10),        label: 'bVII' }
      ] : [
        { chord: T(2, 'm'),    label: 'ii · supertonique' },
        { chord: T(4, 'm'),    label: 'iii · médiante' },
        { chord: T(5),         label: 'IV · sous-dominante' },
        { chord: T(7),         label: 'V · dominante' },
        { chord: T(9, 'm'),    label: 'vi · relatif mineur' },
        { chord: T(11, 'dim'), label: 'vii° · sensible' }
      ];

    case 'quintes':
      return [
        { chord: T(7, isMin ? 'm' : ''), label: 'Quinte (V) — sens horaire' },
        { chord: T(5, isMin ? 'm' : ''), label: 'Quarte (IV) — sens anti-horaire' },
        { chord: T(7),                   label: 'Dominante V (majeur, tension)' },
        { chord: T(0, isMin ? '' : 'm'), label: isMin ? 'Parallèle majeur (même tonique)' : 'Parallèle mineur (même tonique)' },
        { chord: isMin ? T(3) : T(9, 'm'), label: isMin ? 'Relatif majeur (3 demi-tons +)' : 'Relatif mineur (3 demi-tons -)' },
        { chord: T(2, isMin ? 'dim' : 'm'), label: 'ii — accord de couleur' }
      ];

    case 'jazz':
      return isMin ? [
        { chord: chordName + (chordName.includes('7') ? '' : '7'),  label: 'Ajouter 7e (m7)' },
        { chord: chordName.replace(/m\d*/, 'm9') || (chordName + '9'), label: 'm9 (lush)' },
        { chord: chordName.replace(/m\d*/, 'm11') || (chordName + '11'), label: 'm11 (modal)' },
        { chord: T(3, 'maj7'), label: 'bIIImaj7 — sub relatif majeur' },
        { chord: T(5, 'm7'),   label: 'iv7 — II-V vers bVII' },
        { chord: T(7, '7'),    label: 'V7 — dominante mineur harm.' },
        { chord: T(1, '7'),    label: 'bII7 — sub tritonique de V' }
      ] : [
        { chord: chordName + (chordName.includes('maj') ? '' : 'maj7'), label: 'Ajouter 7e maj' },
        { chord: chordName + '9',  label: 'Ajouter 9e' },
        { chord: chordName + '13', label: 'Ajouter 13e (lush)' },
        { chord: T(9, 'm7'),       label: 'vim7 — sub relatif mineur' },
        { chord: T(2, 'm7'),       label: 'iim7 — pour II-V-I' },
        { chord: T(7, '7'),        label: 'V7 — dominante' },
        { chord: T(1, '7'),        label: 'bII7 — sub tritonique de V' }
      ];

    case 'modes':
      return isMin ? [
        { chord: T(0, 'm'),    label: 'Aeolien (mineur naturel) · vous êtes là' },
        { chord: T(5),         label: 'Dorien · IV majeur (au lieu de iv)' },
        { chord: T(1),         label: 'Phrygien · bII majeur (couleur sombre)' },
        { chord: T(2),         label: 'Dorien · II majeur' },
        { chord: T(7),         label: 'Mineur harm · V majeur' },
        { chord: T(2, 'dim'),  label: 'Locrien · ii° (rare)' }
      ] : [
        { chord: T(0),         label: 'Ionien (majeur) · vous êtes là' },
        { chord: T(6),         label: 'Lydien · #IV majeur (couleur lumineuse)' },
        { chord: T(10),        label: 'Mixolydien · bVII majeur (rock/folk)' },
        { chord: T(8),         label: 'Aeolien · bVI majeur (ténébreux)' },
        { chord: T(3),         label: 'Phrygien · bIII majeur' },
        { chord: T(1),         label: 'Phrygien · bII majeur (espagnol)' }
      ];
  }
  return [];
}

// ====== PROGRESSION ======
const DEFAULT_PROGRESSION = '| Am Am | Em Em | Am Dm | Em Am |';
let CURRENT_PROGRESSION = DEFAULT_PROGRESSION;

const CHORD_TOKEN_RE = /^[A-G][#b]?(?:m(?!aj)|maj|min|sus|aug|dim|add|°)?[0-9]*(?:[#b]?[0-9]*)?(?:sus[24]?|add[0-9]+|°)?/;

function tokenizeProgression(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const sub = text.slice(i);
    const m = sub.match(CHORD_TOKEN_RE);
    if (m && m[0].length > 0) {
      tokens.push({ type: 'chord', name: m[0] });
      i += m[0].length;
    } else {
      tokens.push({ type: 'sep', text: text[i] });
      i++;
    }
  }
  return tokens;
}

function progressionToHTML(text) {
  const tokens = tokenizeProgression(text);
  let html = '';
  let chordIdx = 0;
  for (const t of tokens) {
    if (t.type === 'chord') {
      html += `<span class="chord" data-chord="${t.name}" data-prog-idx="${chordIdx}">${t.name}</span>`;
      chordIdx++;
    } else {
      const c = t.text;
      if (c === '<') html += '&lt;';
      else if (c === '>') html += '&gt;';
      else if (c === '&') html += '&amp;';
      else html += c;
    }
  }
  return html;
}

function applyProgression(text) {
  CURRENT_PROGRESSION = text;
  const display = document.getElementById('progression-display');
  display.innerHTML = progressionToHTML(text);
  attachChordTooltips(display);
  renderActiveVoicings();
}

function getUniqueProgressionChords() {
  const tokens = tokenizeProgression(CURRENT_PROGRESSION);
  const seen = new Set();
  const unique = [];
  for (const t of tokens) {
    if (t.type === 'chord' && !seen.has(t.name)) {
      seen.add(t.name);
      unique.push(t.name);
    }
  }
  return unique;
}

function renderActiveVoicings() {
  const grid = document.getElementById('active-voicings-grid');
  if (!grid) return;
  const chords = getUniqueProgressionChords();
  let html = '';
  for (const name of chords) {
    const lib = lookupChord(name);
    const user = getUserVoicings(name);
    const all = [...lib, ...user];
    if (all.length === 0) {
      html += `
        <div class="voicing-card" data-chord="${name}">
          <div class="voicing-name">${name}</div>
          <div class="voicing-empty">Aucun voicing.<br>Hover pour ajouter.</div>
        </div>`;
      continue;
    }
    let pinned = getPinned(name).filter(i => i < all.length);
    if (pinned.length === 0) pinned = [0];
    for (const idx of pinned) {
      const v = all[idx];
      const labelStr = v.name + (all.length > 1 ? ` · ${idx + 1}/${all.length}` : '');
      html += `
        <div class="voicing-card" data-chord="${name}" data-pin-idx="${idx}">
          <button class="voicing-unpin" data-chord="${name}" data-idx="${idx}" type="button" title="Retirer du panneau">×</button>
          <div class="voicing-name">${name}</div>
          <div class="voicing-diagram">${renderFretboard(v)}</div>
          <div class="voicing-label" title="${labelStr}">${labelStr}</div>
        </div>
      `;
    }
  }
  grid.innerHTML = html;
  // Unpin × handlers
  grid.querySelectorAll('.voicing-unpin').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      togglePin(btn.dataset.chord, parseInt(btn.dataset.idx, 10));
      renderActiveVoicings();
    });
  });
  // Cards hoverable → opens popup for that chord
  grid.querySelectorAll('.voicing-card').forEach(card => card.classList.add('chord'));
  attachChordTooltips(grid);
}

function replaceChordAtIdx(progIdx, newChord) {
  const tokens = tokenizeProgression(CURRENT_PROGRESSION);
  let counter = 0;
  for (const t of tokens) {
    if (t.type === 'chord') {
      if (counter === progIdx) { t.name = newChord; break; }
      counter++;
    }
  }
  CURRENT_PROGRESSION = tokens.map(t => t.type === 'chord' ? t.name : t.text).join('');
  try { localStorage.setItem('tehilim-progression', CURRENT_PROGRESSION); } catch (e) {}

  // Update only the specific span (not full re-render — keeps the popup's `el` ref valid)
  const span = document.querySelector(`#progression-display .chord[data-prog-idx="${progIdx}"]`);
  if (span) {
    span.textContent = newChord;
    span.dataset.chord = newChord;
  }
}

function chordMaxFretboardHeight(positions) {
  let maxH = 0;
  for (const p of positions) {
    const fretted = p.frets.filter(f => f > 0);
    const maxFret = fretted.length > 0 ? Math.max(...fretted) : p.baseFret + 3;
    const numFrets = Math.max(4, maxFret - p.baseFret + 1);
    const H = 36 + numFrets * 22 + 22; // matches renderFretboard layout
    if (H > maxH) maxH = H;
  }
  return maxH;
}

function renderFretboardEditor(draftFrets, numEditFrets) {
  numEditFrets = numEditFrets || 7;
  const stringSpacing = 22;
  const fretSpacing = 24;
  const offsetX = 30;
  const offsetY = 50;
  const STR_COUNT = 6;
  const W = offsetX * 2 + stringSpacing * (STR_COUNT - 1);
  const H = offsetY + numEditFrets * fretSpacing + 40;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // X / O toggles for each string above the diagram
  for (let i = 0; i < STR_COUNT; i++) {
    const x = offsetX + i * stringSpacing;
    const isMuted = draftFrets[i] === -1;
    const isOpen = draftFrets[i] === 0;

    // X (mute)
    svg += `<g class="edit-toggle ${isMuted ? 'active' : ''}" data-string="${i}" data-fret="-1">`;
    svg += `<rect x="${x - 9}" y="${offsetY - 44}" width="18" height="14" rx="2" stroke="#444" stroke-width="0.5"/>`;
    svg += `<text x="${x}" y="${offsetY - 33}" fill="${isMuted ? '#000' : '#888'}" font-size="11" text-anchor="middle" font-weight="700" pointer-events="none">×</text>`;
    svg += `</g>`;

    // O (open)
    svg += `<g class="edit-toggle ${isOpen ? 'active' : ''}" data-string="${i}" data-fret="0">`;
    svg += `<rect x="${x - 9}" y="${offsetY - 26}" width="18" height="14" rx="2" stroke="#444" stroke-width="0.5"/>`;
    svg += `<text x="${x}" y="${offsetY - 15}" fill="${isOpen ? '#000' : '#888'}" font-size="11" text-anchor="middle" font-weight="700" pointer-events="none">○</text>`;
    svg += `</g>`;
  }

  // Nut
  svg += `<rect x="${offsetX - 1}" y="${offsetY - 4}" width="${stringSpacing * (STR_COUNT - 1) + 2}" height="5" fill="#ccc"/>`;

  // Frets
  for (let i = 0; i <= numEditFrets; i++) {
    svg += `<line x1="${offsetX}" y1="${offsetY + i * fretSpacing}" x2="${offsetX + (STR_COUNT - 1) * stringSpacing}" y2="${offsetY + i * fretSpacing}" stroke="#444" stroke-width="1"/>`;
  }
  // Strings
  for (let i = 0; i < STR_COUNT; i++) {
    svg += `<line x1="${offsetX + i * stringSpacing}" y1="${offsetY}" x2="${offsetX + i * stringSpacing}" y2="${offsetY + numEditFrets * fretSpacing}" stroke="#666" stroke-width="1"/>`;
  }

  // Click cells (one rect per string per fret)
  for (let s = 0; s < STR_COUNT; s++) {
    for (let f = 1; f <= numEditFrets; f++) {
      const x = offsetX + s * stringSpacing - stringSpacing / 2;
      const y = offsetY + (f - 1) * fretSpacing;
      svg += `<g class="edit-cell" data-string="${s}" data-fret="${f}">`;
      svg += `<rect x="${x}" y="${y}" width="${stringSpacing}" height="${fretSpacing}"/>`;
      svg += `</g>`;
    }
  }

  // Render selected positions
  for (let i = 0; i < STR_COUNT; i++) {
    const f = draftFrets[i];
    if (f > 0) {
      const x = offsetX + i * stringSpacing;
      const y = offsetY + (f - 0.5) * fretSpacing;
      svg += `<circle cx="${x}" cy="${y}" r="9" fill="#4A9EDB" stroke="#0a0a0a" stroke-width="1" pointer-events="none"/>`;
      const fontSize = f >= 10 ? 9 : 10;
      svg += `<text x="${x}" y="${y + 3.5}" fill="#0a0a0a" font-size="${fontSize}" text-anchor="middle" font-weight="700" font-family="monospace" pointer-events="none">${f}</text>`;
    }
  }

  // Fret number indicators on the right side of the diagram
  for (let i = 1; i <= numEditFrets; i++) {
    svg += `<text x="${offsetX + (STR_COUNT - 1) * stringSpacing + 14}" y="${offsetY + (i - 0.5) * fretSpacing + 3}" fill="#444" font-size="9" text-anchor="middle" font-family="monospace">${i}</text>`;
  }

  // Bottom: tuning labels
  for (let i = 0; i < STR_COUNT; i++) {
    svg += `<text x="${offsetX + i * stringSpacing}" y="${offsetY + numEditFrets * fretSpacing + 14}" fill="#4A9EDB" font-size="9" text-anchor="middle" font-family="monospace">${TUNING[i] || ''}</text>`;
    const f = draftFrets[i];
    let label = f === -1 ? '×' : f === 0 ? '○' : f.toString();
    svg += `<text x="${offsetX + i * stringSpacing}" y="${offsetY + numEditFrets * fretSpacing + 28}" fill="#666" font-size="10" text-anchor="middle" font-family="monospace" font-weight="600">${label}</text>`;
  }

  svg += `</svg>`;
  return svg;
}

// ====== Single tooltip global ======
let CURRENT_TOOLTIP_CLOSE = null;

function attachChordTooltips(root) {
  root = root || document;
  const chords = root.querySelectorAll('.chord');
  chords.forEach(el => attachOneChord(el, el.dataset.chord));
}

function attachOneChord(el, chordNameInit) {
  // State that lives across re-renders for THIS tooltip session
  let chordName = chordNameInit;
  let posIndex = 0;
  let tooltip = null;
  let mode = 'view';                   // 'view' | 'add' | 'harmonic'
  let harmTab = 'diatonique';
  let draftFrets = [-1, -1, -1, -1, -1, -1];
  let draftName = '';

  function getAllPositions() {
    const lib = lookupChord(chordName);
    const user = getUserVoicings(chordName).map(v => Object.assign({ _user: true }, v));
    return [...lib, ...user];
  }

  function maxHeight() {
    const positions = getAllPositions();
    if (positions.length === 0) return 165;
    let maxH = 0;
    for (const p of positions) {
      const fretted = p.frets.filter(f => f > 0);
      const maxFret = fretted.length > 0 ? Math.max(...fretted) : p.baseFret + 3;
      const numFrets = Math.max(4, maxFret - p.baseFret + 1);
      const H = 36 + numFrets * 22 + 22;
      if (H > maxH) maxH = H;
    }
    return maxH;
  }

  function position() {
    if (!tooltip) return;
    const rect = el.getBoundingClientRect();
    const ttRect = tooltip.getBoundingClientRect();
    let left = rect.left + window.scrollX + rect.width / 2 - ttRect.width / 2;
    const maxLeft = window.scrollX + window.innerWidth - ttRect.width - 12;
    const minLeft = window.scrollX + 12;
    if (left > maxLeft) left = maxLeft;
    if (left < minLeft) left = minLeft;
    let top = rect.bottom + window.scrollY + 10;
    if (rect.bottom + ttRect.height + 20 > window.innerHeight) {
      top = rect.top + window.scrollY - ttRect.height - 10;
    }
    tooltip.style.left = `${left}px`;
    tooltip.style.top = `${top}px`;
  }

  function renderActionsBar() {
    const inProg = el.dataset.progIdx !== undefined;
    const replaceBtn = inProg
      ? `<button class="tt-action-btn ${mode === 'rename' ? 'active' : ''}" data-mode="rename" type="button">✎ remplacer</button>`
      : '';
    return `
      <div class="tt-actions">
        ${replaceBtn}
        <button class="tt-action-btn ${mode === 'add' ? 'active' : ''}" data-mode="add" type="button">+ doigté</button>
        <button class="tt-action-btn ${mode === 'harmonic' ? 'active' : ''}" data-mode="harmonic" type="button">⚇ harmonique</button>
      </div>
    `;
  }

  function renderRenameForm() {
    return `
      <div class="tt-name">✎ Remplacer ${chordName} par…</div>
      <div class="tt-add-form">
        <input class="tt-rename-input" type="text" placeholder="ex: G, Am7, F#m, Cmaj9…" value="">
        <span class="tt-form-label" style="color:var(--text-faint);font-size:10px">
          Tape n'importe quel nom d'accord (les inconnus s'affichent sans diagramme).
          La progression sera mise à jour automatiquement.
        </span>
        <div class="tt-form-buttons">
          <button class="tt-rename-cancel" type="button">✕ annuler</button>
          <button class="save tt-rename-save" type="button">✓ remplacer</button>
        </div>
      </div>
    `;
  }

  function setCurrentChord(newName, alsoReplaceInProgression) {
    if (alsoReplaceInProgression && el.dataset.progIdx !== undefined) {
      const idx = parseInt(el.dataset.progIdx, 10);
      replaceChordAtIdx(idx, newName);
      // The span's data-chord and textContent are now updated.
      // Keep `el` in sync with the (now mutated) span — same reference still valid.
    }
    chordName = newName;
    posIndex = 0;
    mode = 'view';
    update();
  }

  function renderViewBody() {
    const positions = getAllPositions();
    if (positions.length === 0) {
      return `
        <div class="tt-name">${chordName}</div>
        <div class="tt-fretboard" style="height: auto; min-height: 80px;">
          <div style="color: var(--text-faint); font-size: 12px; text-align: center; padding: 16px 8px; line-height: 1.5;">
            Aucun voicing dans la bibliothèque pour <strong style="color:var(--text)">${chordName}</strong>
            <br>en accordage <strong style="color:var(--text)">${tuningKey()}</strong>.
            <br><br>
            Clique <strong style="color:var(--accent)">+ doigté</strong> pour entrer le tien.
          </div>
        </div>
      `;
    }
    const p = positions[posIndex];
    const isUser = p._user;
    const pinned = isPinned(chordName, posIndex);
    const dots = positions.map((_, i) => `<span class="tt-dot${i === posIndex ? ' active' : ''}${isPinned(chordName, i) ? ' pinned' : ''}" data-i="${i}"></span>`).join('');
    const userBadge = isUser ? '<span class="tt-custom-badge">★ custom</span>' : '';
    const deleteBtn = isUser ? `<button class="tt-delete-btn" type="button">supprimer ce doigté</button>` : '';
    return `
      <div class="tt-name">${chordName} — ${p.name}${userBadge}</div>
      <div class="tt-fretboard" style="height: ${maxHeight()}px;">${renderFretboard(p)}</div>
      <div class="tt-controls">
        <button class="tt-arrow tt-prev" type="button">‹</button>
        <span class="tt-pos">${posIndex + 1} / ${positions.length}</span>
        <button class="tt-arrow tt-next" type="button">›</button>
        <button class="tt-pin ${pinned ? 'pinned' : ''}" type="button" title="${pinned ? 'Retirer du panneau' : 'Épingler au panneau imprimable'}">★</button>
      </div>
      <div class="tt-dots">${dots}</div>
      ${deleteBtn}
    `;
  }

  function renderAddForm() {
    return `
      <div class="tt-name">+ Doigté · ${chordName} · ${tuningKey()}</div>
      <div class="fret-editor">${renderFretboardEditor(draftFrets, 7)}</div>
      <div class="tt-add-form">
        <input class="tt-add-name" type="text" placeholder="Nom (optionnel)" value="${draftName.replace(/"/g, '&quot;')}">
        <div class="tt-form-buttons">
          <button class="tt-add-clear" type="button">↺ vider</button>
          <button class="tt-add-cancel" type="button">✕ annuler</button>
          <button class="save tt-add-save" type="button">✓ ajouter</button>
        </div>
      </div>
    `;
  }

  function renderHarmonicPanel() {
    const types = [
      ['diatonique', 'Diatonique'],
      ['quintes',    'Quintes'],
      ['jazz',       'Jazz'],
      ['modes',      'Modes']
    ];
    const tabs = types.map(([k, lab]) =>
      `<button class="tt-harm-tab ${harmTab === k ? 'active' : ''}" data-tab="${k}" type="button">${lab}</button>`
    ).join('');
    const items = getHarmonic(chordName, harmTab).map(it =>
      `<button class="tt-harm-item" data-chord="${it.chord}" type="button"><span class="h-chord">${it.chord}</span><span class="h-label">${it.label}</span></button>`
    ).join('');
    return `
      <div class="tt-name">⚇ ${chordName} — voisins ${harmTab}</div>
      <div class="tt-harm-panel">
        <div class="tt-harm-tabs">${tabs}</div>
        <div class="tt-harm-list">${items || '<div style="color:var(--text-faint);font-size:11px;text-align:center;padding:8px;">Aucune suggestion</div>'}</div>
      </div>
    `;
  }

  function update() {
    if (!tooltip) return;
    let body;
    if (mode === 'add') body = renderAddForm();
    else if (mode === 'harmonic') body = renderHarmonicPanel();
    else if (mode === 'rename') body = renderRenameForm();
    else body = renderViewBody();

    tooltip.innerHTML = `<button class="tt-close" type="button" aria-label="Fermer">×</button>` + body + renderActionsBar();
    bindEvents();
  }

  function bindEvents() {
    // Close button
    const closeBtn = tooltip.querySelector('.tt-close');
    if (closeBtn) closeBtn.addEventListener('click', closeTooltip);

    // View mode controls — navigate (no auto-pin)
    const prev = tooltip.querySelector('.tt-prev');
    if (prev) prev.addEventListener('click', e => {
      e.stopPropagation();
      const positions = getAllPositions();
      posIndex = (posIndex - 1 + positions.length) % positions.length;
      update();
    });
    const next = tooltip.querySelector('.tt-next');
    if (next) next.addEventListener('click', e => {
      e.stopPropagation();
      const positions = getAllPositions();
      posIndex = (posIndex + 1) % positions.length;
      update();
    });
    tooltip.querySelectorAll('.tt-dot').forEach(d => {
      d.addEventListener('click', e => {
        posIndex = parseInt(e.target.dataset.i, 10);
        update();
      });
    });
    // ★ Pin toggle — adds/removes current voicing from the printable panel
    const pinBtn = tooltip.querySelector('.tt-pin');
    if (pinBtn) pinBtn.addEventListener('click', e => {
      e.stopPropagation();
      togglePin(chordName, posIndex);
      renderActiveVoicings();
      update();
    });

    // Delete custom voicing
    const delBtn = tooltip.querySelector('.tt-delete-btn');
    if (delBtn) delBtn.addEventListener('click', () => {
      const lib = lookupChord(chordName);
      const userIdx = posIndex - lib.length;
      if (userIdx >= 0) {
        removeUserVoicing(chordName, userIdx);
        posIndex = Math.max(0, posIndex - 1);
        renderActiveVoicings();
        update();
      }
    });

    // Action buttons
    tooltip.querySelectorAll('.tt-action-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const m = btn.dataset.mode;
        if (mode === m) {
          mode = 'view';
        } else {
          mode = m;
          if (mode === 'add') {
            // Pre-fill draft from current displayed voicing if any
            const positions = getAllPositions();
            if (positions[posIndex]) {
              draftFrets = positions[posIndex].frets.slice();
            } else {
              draftFrets = [-1, -1, -1, -1, -1, -1];
            }
            draftName = '';
          }
        }
        update();
      });
    });

    // Fretboard editor (interactive cells)
    const editor = tooltip.querySelector('.fret-editor');
    if (editor) {
      editor.addEventListener('click', e => {
        const target = e.target.closest('.edit-cell, .edit-toggle');
        if (!target) return;
        const s = parseInt(target.dataset.string, 10);
        const f = parseInt(target.dataset.fret, 10);
        if (isNaN(s) || isNaN(f)) return;
        // Click on already-set cell: clear (set to muted)
        if (draftFrets[s] === f && f !== -1) {
          draftFrets[s] = -1;
        } else {
          draftFrets[s] = f;
        }
        // Re-render only the editor SVG, not the whole tooltip, to keep focus
        const ed = tooltip.querySelector('.fret-editor');
        if (ed) ed.innerHTML = renderFretboardEditor(draftFrets, 7);
      });
    }

    // Add form save/cancel/clear
    const addSave = tooltip.querySelector('.tt-add-save');
    const addCancel = tooltip.querySelector('.tt-add-cancel');
    const addClear = tooltip.querySelector('.tt-add-clear');
    const addName = tooltip.querySelector('.tt-add-name');
    if (addName) {
      addName.addEventListener('input', () => { draftName = addName.value; });
    }
    if (addSave) addSave.addEventListener('click', () => {
      // Validate: at least one string must have a fret >= 0 (open or fretted)
      const playable = draftFrets.some(f => f >= 0);
      if (!playable) {
        addSave.textContent = '× rien à jouer';
        setTimeout(() => { addSave.textContent = '✓ ajouter'; }, 1500);
        return;
      }
      const v = buildVoicingFromFrets(draftFrets.slice(), draftName.trim() || 'Custom');
      addUserVoicing(chordName, v);
      const positions = getAllPositions();
      posIndex = positions.length - 1;
      // Auto-pin newly added custom voicing so it shows in panel right away
      if (!isPinned(chordName, posIndex)) togglePin(chordName, posIndex);
      renderActiveVoicings();
      mode = 'view';
      update();
    });
    if (addCancel) addCancel.addEventListener('click', () => { mode = 'view'; update(); });
    if (addClear) addClear.addEventListener('click', () => {
      draftFrets = [-1, -1, -1, -1, -1, -1];
      const ed = tooltip.querySelector('.fret-editor');
      if (ed) ed.innerHTML = renderFretboardEditor(draftFrets, 7);
    });

    // Harmonic tabs + items
    tooltip.querySelectorAll('.tt-harm-tab').forEach(t => {
      t.addEventListener('click', () => { harmTab = t.dataset.tab; update(); });
    });
    tooltip.querySelectorAll('.tt-harm-item').forEach(item => {
      item.addEventListener('click', () => {
        // If this chord is in the progression, replace it there too
        setCurrentChord(item.dataset.chord, true);
      });
    });

    // Rename form
    const renameInput = tooltip.querySelector('.tt-rename-input');
    const renameSave = tooltip.querySelector('.tt-rename-save');
    const renameCancel = tooltip.querySelector('.tt-rename-cancel');
    if (renameInput) {
      renameInput.focus();
      renameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') renameSave.click();
        if (e.key === 'Escape') renameCancel.click();
      });
    }
    if (renameSave) renameSave.addEventListener('click', () => {
      const v = renameInput.value.trim();
      if (!v) return;
      setCurrentChord(v, true);
    });
    if (renameCancel) renameCancel.addEventListener('click', () => { mode = 'view'; update(); });
  }

  function closeTooltip() {
    if (tooltip) { tooltip.remove(); tooltip = null; }
    if (CURRENT_TOOLTIP_CLOSE === closeTooltip) CURRENT_TOOLTIP_CLOSE = null;
  }

  function show() {
    if (tooltip) return; // already open
    // Close any other open tooltip first
    if (CURRENT_TOOLTIP_CLOSE) CURRENT_TOOLTIP_CLOSE();
    chordName = el.dataset.chord || chordNameInit;
    // Open at the first pinned position for this chord (matches the panel)
    const pinned = getPinned(chordName);
    posIndex = pinned[0] || 0;
    mode = 'view';
    harmTab = 'diatonique';
    draftFrets = [-1, -1, -1, -1, -1, -1];
    draftName = '';
    tooltip = document.createElement('div');
    tooltip.className = 'chord-tooltip';
    document.body.appendChild(tooltip);
    update();
    position();
    CURRENT_TOOLTIP_CLOSE = closeTooltip;
  }

  // Open on hover (no auto-close on leave — user clicks × to close)
  el.addEventListener('mouseenter', show);
}

// ====== INIT ======
(function init() {
  // Restore saved tuning
  try {
    const savedTuning = localStorage.getItem('tehilim-tuning');
    if (savedTuning) {
      const arr = JSON.parse(savedTuning);
      if (Array.isArray(arr) && arr.length === 6) {
        setTuning(arr);
        const presetEl = document.getElementById('tuning-preset');
        const customEl = document.getElementById('tuning-custom');
        const matched = findTuningPreset(arr);
        if (matched) {
          presetEl.value = matched;
        } else {
          presetEl.value = 'custom';
          customEl.hidden = false;
          customEl.value = arr.join(' ');
        }
      }
    } else {
      // No saved tuning, ensure UI shows current
      setTuning(TUNING);
    }
  } catch (e) {}

  // Load user voicings + active positions
  loadUserVoicings();
  loadActivePos();

  // Restore saved progression
  let progression = DEFAULT_PROGRESSION;
  try {
    const savedProg = localStorage.getItem('tehilim-progression');
    if (savedProg) progression = savedProg;
  } catch (e) {}
  applyProgression(progression);

  // Attach tooltips for the rest of the page (chant-tip etc.)
  attachChordTooltips(document.querySelector('.chant-tip'));

  // ===== Tuning UI handlers =====
  const presetEl = document.getElementById('tuning-preset');
  const customEl = document.getElementById('tuning-custom');
  presetEl.addEventListener('change', () => {
    if (presetEl.value === 'custom') {
      customEl.hidden = false;
      customEl.focus();
      customEl.value = TUNING.join(' ');
    } else {
      customEl.hidden = true;
      const arr = TUNING_PRESETS[presetEl.value];
      if (arr) setTuning(arr);
    }
  });
  customEl.addEventListener('input', () => {
    const arr = parseTuningString(customEl.value);
    if (arr) setTuning(arr);
  });

  // Click outside chord/tooltip closes the open tooltip.
  // Use CAPTURE phase so we evaluate the target BEFORE the tooltip's own
  // click handlers replace innerHTML and detach the target from the DOM.
  document.addEventListener('click', e => {
    if (!CURRENT_TOOLTIP_CLOSE) return;
    if (e.target.closest('.chord-tooltip') || e.target.closest('.chord')) return;
    CURRENT_TOOLTIP_CLOSE();
  }, true);

  // ===== Progression reset =====
  const resetBtn = document.getElementById('prog-reset');
  if (resetBtn) resetBtn.addEventListener('click', () => {
    applyProgression(DEFAULT_PROGRESSION);
    try { localStorage.removeItem('tehilim-progression'); } catch (e) {}
  });

  // ===== Print button =====
  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', () => window.print());

})();
</script>
